# LOC — Nginx reverse proxy
# Place at: /etc/nginx/sites-available/loc
# Enable: ln -s /etc/nginx/sites-available/loc /etc/nginx/sites-enabled/loc
#
# Replace YOUR_DOMAIN with your actual domain (e.g. loctravels.com)
# Run certbot AFTER pointing DNS and creating this file:
#   certbot --nginx -d YOUR_DOMAIN -d www.YOUR_DOMAIN -d api.YOUR_DOMAIN

# ── Redirect HTTP → HTTPS ───────────────────────────────────────────────────
server {
    listen 80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN api.YOUR_DOMAIN;
    return 301 https://$host$request_uri;
}

# ── Frontend (Next.js on port 3000) ─────────────────────────────────────────
server {
    listen 443 ssl;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # SSL — managed by Certbot (added automatically on first run)
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy to Next.js
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Next.js streaming / SSE support
        proxy_buffering    off;
        proxy_read_timeout 300s;
    }

    # Static assets — longer cache
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# ── Backend (FastAPI on port 8000) ───────────────────────────────────────────
server {
    listen 443 ssl;
    server_name api.YOUR_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # FastAPI / uvicorn defaults
        proxy_read_timeout 60s;
        client_max_body_size 10M;
    }
}
