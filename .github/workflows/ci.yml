name: CI

on:
  push:
    branches: [develope, main]
  pull_request:
    branches: [develope, main]

jobs:
  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: loc_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Test (pytest)
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/loc_test
          REDIS_URL: redis://localhost:6379
        run: uv run pytest -q

  frontend:
    name: Frontend (eslint + tsc + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint (eslint)
        run: npm run lint
      - name: Type check (tsc)
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
